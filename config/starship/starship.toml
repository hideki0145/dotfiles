[directory]
format = '[ $path]($style)[$read_only ]($read_only_style)'
style = 'fg:dir bg:surface bold'
read_only = ' пА£'
read_only_style = 'fg:read_only bg:surface'
truncation_symbol = 'вА¶/'
before_repo_root_style = 'fg:dir_short bg:surface'
repo_root_style = 'fg:dir bg:surface bold'
repo_root_format = '[ $before_root_path]($before_repo_root_style)[${repo_root}]($repo_root_style)[$path]($style)[$read_only ]($read_only_style)'

[git_branch]
format = '[ $symbol$branch(:$remote_branch)]($style)'
symbol = 'пД¶ '
style = 'fg:git_branch bg:surface'

[git_status]
format = '[$all_status$ahead_behind ]($style)'
conflicted = ' ~${count}'
ahead = ' вЗ°${count}'
behind = ' вЗ£${count}'
diverged = ' вЗХвЗ°${ahead_count}вЗ£${behind_count}'
untracked = ' ?${count}'
stashed = ' *${count}'
modified = ' !${count}'
staged = ' +${count}'
renamed = ' ¬ї${count}'
deleted = ' x${count}'
style = 'fg:git_status bg:surface'

[fill]
symbol = 'вФА'
style = 'fg:fill'

[status]
format = '[ $symbol$status ]($style)'
symbol = 'вЬШ '
not_executable_symbol = 'вЬШ '
not_found_symbol = 'вЬШ '
sigint_symbol = 'вЬШ '
signal_symbol = 'вЬШ '
style = 'fg:status bg:surface'
disabled = false

[cmd_duration]
format = '[ пЙТ $duration ]($style)'
style = 'fg:cmd_duration bg:surface'

[jobs]
format = '[ $symbol$number ]($style)'
symbol = 'у∞ЂҐ '
style = 'fg:jobs bg:surface'

[nodejs]
format = '[ $symbol$version ]($style)'
version_format = '${raw}'
symbol = 'оЬШ '
style = 'fg:nodejs bg:surface'

[python]
format = '[ $symbol$pyenv_prefix$version( \($virtualenv\)) ]($style)'
version_format = '${raw}'
symbol = 'оИµ '
style = 'fg:python bg:surface'

[ruby]
format = '[ $symbol$version ]($style)'
version_format = '${raw}'
symbol = 'оЮС '
style = 'fg:ruby bg:surface'

[rust]
format = '[ $symbol$version ]($style)'
version_format = '${raw}'
symbol = 'оЮ® '
style = 'fg:rust bg:surface'

[mise]
symbol = 'пВЕ '
style = 'fg:mise bg:surface'
format = '[ $symbol( $health) ]($style)'
healthy_symbol = ''
unhealthy_symbol = 'error'
disabled = false

[sudo]
format = '[ $symbol ]($style)'
symbol = 'пВД '
style = 'fg:sudo bg:surface'
disabled = false

[username]
format = '[ пАЗ $user]($style)'
style_root = 'fg:context bg:surface bold'
style_user = 'fg:context bg:surface'

[hostname]
format = '[@$hostname ]($style)'
style = 'fg:context bg:surface'

[time]
format = '[ пАЧ $time ]($style)'
time_format = '%H:%M:%S'
style = 'fg:time bg:surface'
disabled = false
