"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
[оВ∞](fg:surface)\
$fill\
[оВ≤](fg:surface)\
$status\
$cmd_duration\
$jobs\
$nodejs\
$python\
$ruby\
$rust\
$mise\
$sudo\
$username\
$hostname\
$time\
[ ](bg:surface)\
\n\
$character\
"""
palette = 'powerlevel10k'

[palettes.powerlevel10k]
surface = '#303030'
os = '#eeeeee'
dir = '#00afff'
dir_short = '#8787d7'
read_only = '#d75f87'
git_branch = '#5fd700'
git_status = '#d7af00'
fill = '#808080'
status = '#d70000'
cmd_duration = '#a8a8a8'
jobs = '#5f87af'
nodejs = '#5faf00'
python = '#00afaf'
ruby = '#d75f87'
rust = '#00afaf'
mise = '#af5fd7'
sudo = '#5f87af'
context = '#d7af87'
time = '#5f8787'

[os]
format = '[ $symbol ](fg:os bg:surface)'
disabled = false

