Garuda = 'пМЈ'
Gentoo = 'пМН'
HardenedBSD = 'пММ'
Illumos = 'пМ¶'
Ios = 'пЕє'
InstantOS = 'пЕЉ'
Kali = 'пМІ'
Linux = 'пЕЉ'
Mabox = 'пМТ'
Macos = 'пЕє'
Manjaro = 'пМТ'
Mariner = 'пЕЉ'
MidnightBSD = 'пММ'
Mint = 'пМО'
NetBSD = 'пЕЉ'
NixOS = 'пМУ'
Nobara = 'пОА'
OpenBSD = 'пМ®'
OpenCloudOS = 'пГВ'
openEuler = 'пЕЉ'
openSUSE = 'пМФ'
OracleLinux = 'пМЦ'
